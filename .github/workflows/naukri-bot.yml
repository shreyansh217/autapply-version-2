name: Naukri Auto-Apply & Resume Upload

on:
  schedule:
    # GitHub uses UTC time. IST is UTC +5:30.
    # 10:00 AM IST -> 04:30 UTC
    - cron: '30 4 * * *'
    # 12:00 PM IST (Noon) -> 06:30 UTC
    - cron: '30 6 * * *'
    # 02:00 PM IST -> 08:30 UTC
    - cron: '30 8 * * *'
    # 04:00 PM IST -> 10:30 UTC
    - cron: '30 10 * * *'

  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  run-naukri-bot:
    runs-on: ubuntu-latest

    defaults:
      run:
        # All "run:" steps will execute inside this subfolder
        working-directory: Naukri-autoapply-bot

    steps:
      # ── 1. Checkout the repository (includes resume.pdf) ──────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ──────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Naukri-autoapply-bot/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Install Firefox + Geckodriver (via apt — reliable, no curl/tar) ───
      - name: Install Firefox and Geckodriver
        run: |
          sudo apt-get update -y
          sudo apt-get install -y firefox-geckodriver
          firefox --version
          geckodriver --version

      # ── 6. Run Auto-Apply Script ──────────────────────────────────────
      - name: Run Job Auto-Apply
        env:
          NAUKRI_EMAIL:    ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python Naukri-Mozilla.py

      # ── 7. Run Resume Upload Script ───────────────────────────────────
      - name: Run Resume Upload
        env:
          NAUKRI_EMAIL:    ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python Naukri-ResumeUpload.py
